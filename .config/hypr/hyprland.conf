########################################
#       https://wiki.hypr.land/        #
########################################

########################################
#              My Programs             #
########################################
$mainMod = SUPER
$terminal0 = ghostty
$terminal1 = foot
$file = ghostty -e spf
$browser = librewolf
$editor = ghostty -e nvim
$bar = waybar
$polkit = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
$wallpaper = swaybg -i /home/dash-/.config/hypr/epic-cat.jpg -m fill
$menu = rofi -show run -theme /home/dash-/.config/rofi/theme.rasi
$display = nwg-displays
$wifi&bt = /home/dash-/.config/hypr/wifi-bt-toggle.sh

########################################
#           Environment Vars           #
########################################
# env = WLR_NO_HARDWARE_CURSORS,1
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = GDK_BACKEND,wayland,x11
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = OZONE_PLATFORM,wayland
env = MOZ_ENABLE_WAYLAND,1
env = GTK_THEME,adwaita-dark-amoled
env = GTK_ICON_THEME,beautyline
env = QT_QPA_PLATFORMTHEME,qt5ct
# env = QT_STYLE_OVERRIDE,adwaita-dark
# env = XCURSOR_THEME,Bibata-Original-Classic # Cursor theme
env = XCURSOR_THEME,DIM
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
# env = SWAYSOCK=$XDG_RUNTIME_DIR/hypr/$HYPRLAND_INSTANCE_SIGNATURE/.socket2.sock,swaykbdd
env = QT_QPA_PLATFORM,wayland
env = SDL_VIDEODRIVER,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

########################################
#           Autostart apps             #
########################################
# exec-once = hyprctl plugin load /home/dash-/Downloads/Hyprspace/Hyprspace.so
exec-once = hyprpm reload
exec-once = rfkill block 0
exec-once = dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE
exec-once = $bar & $wallpaper & hypridle & mako & $polkit
exec-once = xhost +local:
exec-once = wayscriber --daemon
# exec-once = mpd 
exec-once = easyeffects --gapplication-service
exec-once = $terminal -e btop
exec-once = echo "on" > /tmp/wifi_state.txt
# exec-once = sleep 5 && $wifi&bt
# exec-once = sh -c 'until mpc status >/dev/null 2>&1; do sleep 1; done; mpd-mpris'

permission = /usr/(bin|local/bin)/hyprctl, plugin, allow

########################################
#            Monitor setup             #
########################################
# monitor=,preferred,auto,auto
monitor = VGA-1,1440x900@74.98,0x0,1
# monitor = eDP-1,1366x768@60.06,0x0,1
# monitor = eDP-1,1920x1080@60Hz,0x0,1

########################################
#            Input settings            #
########################################
input {
    kb_layout = us,ir
    
    kb_options = grp:rwin_toggle, grp:win_space_toggle, ctrl:nocaps, grp_led:scroll, shift:both_capslock
    numlock_by_default = true
    follow_mouse = 1
    sensitivity = 0
    repeat_rate = 50
    repeat_delay = 400
    accel_profile = adaptive
    focus_on_close = 1
    mouse_refocus = true
    float_switch_override_focus = 2
    touchpad {
        natural_scroll = true
        disable_while_typing = false
        tap-to-click = true
        drag_lock = false
        middle_button_emulation = true
        tap-and-drag = true
        scroll_factor = 0.3
    }
}
render {
        direct_scanout = 2
        xp_mode = false
        new_render_scheduling = true
        use_fp16 = 1
}


########################################
#           General settings           #
########################################
general {
	# layout = scrolling
    gaps_in = 0
    gaps_out = 0
    border_size = 0
    resize_on_border = true
    col.active_border = rgba(00ffffff) rgba(0000ffff) -360deg
    # col.active_border = 0xffffffff
    # col.inactive_border = 0x00000000
    layout = dwindle
    gesture = 3, horizontal, workspace
    gesture = 3, vertical, dispatcher
    gesture = 3, horizontal, mod: $mainMod, scale: 1.5, float
    gesture = 4, vertical, close
    snap {
    	enabled = true
    }
}

workspace = special:magic, layout:dwindle
workspace = 1, layout:dwindle
workspace = 2, layout:dwindle
workspace = 3, layout:dwindle
workspace = 4, layout:dwindle
workspace = 5, layout:dwindle
workspace = 6, layout:scrolling
workspace = 7, layout:scrolling
workspace = 8, layout:scrolling
workspace = 9, layout:master
workspace = 10, layout:master

########################################
#           Cursor settings            #
########################################
cursor {
	min_refresh_rate = 60
	zoom_rigid = true
	zoom_disable_aa = true
	inactive_timeout = 10
	no_warps = false
	persistent_warps = false
	zoom_rigid = false
	zoom_detached_camera = false
	hide_on_key_press = false
	zoom_disable_aa = true
}

bind = $mainMod, L, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor -j | jq '.float') + 0.25}")
bind = $mainMod SHIFT, L, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {v=$(hyprctl getoption cursor:zoom_factor -j | jq '.float') - 0.25; if(v<1)v=1; print v}")
########################################
#           Window decoration          #
########################################
decoration {
    rounding = 0
    dim_inactive = true
    dim_strength = 0.2
    dim_special = 0
    rounding_power = 9.0
    inactive_opacity = 1.0
    active_opacity = 1.0
    blur {
        enabled = 0
        size = 2
        passes = 3
        noise = 0.0
        brightness = 1.0
        new_optimizations = true
        ignore_opacity = true
    }
    shadow {
        enabled = 0
        range = 5
        render_power = 1
        color = rgba(000000aa)
    }
    glow {
    	enabled = false
    	range = 4
    	render_power = 2
    	color = rgba(eeffffff)
    	color_inactive = rgba(eeffff88)
    }
}

########################################
#            Animations                #
########################################
animations {
    enabled = yes
    workspace_wraparound = false
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = myBezier,       0.05, 0.9,  0.1,  1.05
    bezier = punchy,         0.2,  1.3,  0.3,  1.0
    bezier = punchyWindow,   0.2,  1.2,  0.4,  1.05
    bezier = fromBottom,     0.05, 0.9,  0.1,  1.05
    
    #           NAME,                ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,              1,     10,    default
    animation = border,              1,     1,     default
    animation = borderangle,         1,     10,    default
    animation = fade,                1,     7,     default
    # animation = workspaces,          1,     6,     punchy
	bezier = spring, 0.2, 1.2, 0.3, 1.0
    animation = workspaces, 1, 6, spring
    animation = zoomFactor,          1,     4,     default
    # animation = fade,                1,     4,     default
    animation = windows,             1,     4,     default
    animation = windowsIn,           1,     7,     fromBottom,   slide bottom
    animation = windowsOut,          1,     10,    fromBottom,   slide bottom
    animation = specialWorkspaceIn,  1,     6,     fromBottom,   slide top
    animation = specialWorkspaceOut, 1,     10,    fromBottom,   slide bottom
}

########################################
#            Dwindle layout            #
########################################
dwindle {
    # pseudotile = yes
    preserve_split = yes
}

########################################
#            Misc settings             #
########################################
misc {
	mouse_move_enables_dpms = true
    focus_on_activate = false
	key_press_enables_dpms = true
	always_follow_on_dnd = true
	animate_manual_resizes = true
	animate_mouse_windowdragging = true
	allow_session_lock_restore = true
	anr_missed_pings = 10
	vrr = 1
	layers_hog_keyboard_focus = true
	animate_manual_resizes = true
	animate_mouse_windowdragging = true
	enable_swallow = false
	render_unfocused_fps = 30
	size_limits_tiled = true
}

binds {
	scroll_event_delay = 50
	workspace_back_and_forth = false
	hide_special_on_workspace_change = true
	allow_workspace_cycles = true
	workspace_center_on = 0
	movefocus_cycles_fullscreen = true
}
########################################
#            Keybindings               #
########################################
# System
bind = $mainMod, M, exec, systemctl suspend
bind = $mainMod, N, exec, systemctl suspend && hyprlock
bind = , INSERT, exec, hyprctl switchxkblayout at-translated-set-2-keyboard next
bind = ALT, less, exec, hyprctl switchxkblayout at-translated-set-2-keyboard next
bind = CTRL, less, exec, hyprctl switchxkblayout at-translated-set-2-keyboard next
bind = , XF86WLAN, exec, $wifi&bt

# Window control
bind = $mainMod, Q, killactive
bind = $mainMod, C, killactive
#bind = $mainMod, Z, pseudo
bind = $mainMod, Z, exec, hypr-zoom -duration 1 -easing OutCubic -easingOut OutCubic -interp Linear -steps 60 -target 2
bind = $mainMod CTRL, mouse_down, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor -j | jq '.float') + 1}")
bind = $mainMod CTRL, mouse:276, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor -j | jq '.float') + 1}")
bind = $mainMod CTRL, mouse_up, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor -j | jq '.float') - 1}")
bind = $mainMod CTRL, mouse:275, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor -j | jq '.float') - 1}")
bind = $mainMod, X, layoutmsg, togglesplit
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, V, togglefloating
bind = $mainMod, F, fullscreen, 1
bind = , F11, fullscreen
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Apps
bind = $mainMod, RETURN, exec, $terminal0
bind = $mainMod, KP_ENTER, exec, $terminal0
bind = $mainMod, T, exec, $terminal1
bind = , XF86LaunchA, exec, $terminal0
bind = $mainMod, E, exec, $file
bind = $mainMod, R, exec, $editor
bind = , XF86Explorer, exec, $file
bind = $mainMod, G, exec, $browser
bind = $mainMod, D, exec, killall rofi || $menu
bind = , XF86Search, exec, killall rofi || $menu
bind = $mainMod, W, exec, killall $bar || $bar
bind = , XF86Display, exec, killall $display || $display
bind = , XF86Tools, exec, ghostty -e btop
bind = $mainMod, I, exec, (killall hypridle && notify-send "stop hypridle") || (notify-send "start hypridle" && hypridle)
bind = $mainMod, O, exec, wayscriber --daemon-toggle

# Screenshot & Screenrecord
bind = , Print, exec, bash -c '~/.config/hypr/screenshot.sh'
bind = , F9, exec, bash -c '~/.config/hypr/wf-recorder-script.sh'
bind = , F10, exec, bash -c '~/.config/hypr/wf-recorder-kill.sh'

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspace
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Workspace switching with mouse
bind = $mainMod, mouse:276, workspace, e+1
bind = $mainMod, mouse:275, workspace, e-1
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Workspace switching with < key(for some thinkpads)
bind = SHIFT, less, workspace, e+1
bind = $mainMod, less, workspace, e+1

# Audio controls
bind = $mainMod, equal, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = $mainMod, minus, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle

# Media controls
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = $mainMod, P, exec, playerctl play-pause
bind = $mainMod, XF86AudioMute, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = $mainMod SHIFT, P, exec, playerctl next
bind = $mainMod, XF86AudioRaiseVolume, exec, playerctl next
bind = $mainMod CTRL, XF86AudioRaiseVolume, exec, playerctl position 5+
bind = , XF86AudioPrev, exec, playerctl previous
bind = $mainMod CTRL, P, exec, playerctl previous
bind = $mainMod, XF86AudioLowerVolume, exec, playerctl previous
bind = $mainMod CTRL, XF86AudioLowerVolume, exec, playerctl position 5-
bind = , XF86AudioStop, exec, playerctl stop
bind = $mainMod, XF86AudioMicMute, exec, playerctl stop

# Brightness controls
bind = , XF86MonBrightnessUp, exec, brightnessctl --device=intel_backlight set +10%
bind = , XF86MonBrightnessDown, exec, brightnessctl --device=intel_backlight set 10%-

# Window resize
bind = $mainMod CTRL, right, resizeactive, 10 0
bind = $mainMod CTRL, left, resizeactive, -10 0
bind = $mainMod CTRL, up, resizeactive, 0 -10
bind = $mainMod CTRL, down, resizeactive, 0 10
bind = $mainMod CTRL, L, resizeactive, 10 0
bind = $mainMod CTRL, H, resizeactive, -10 0
bind = $mainMod CTRL, K, resizeactive, 0 -10
bind = $mainMod CTRL, J, resizeactive, 0 10

# Window move
bind = $mainMod SHIFT, right, moveactive, 30 0
bind = $mainMod SHIFT, left, moveactive, -30 0
bind = $mainMod SHIFT, up, moveactive, 0 -30
bind = $mainMod SHIFT, down, moveactive, 0 30
bind = $mainMod SHIFT, L, moveactive, 30 0

# Scrolling layout
bind = $mainMod, period, layoutmsg, move +col
bind = $mainMod, comma, layoutmsg, move -col
bind = $mainMod SHIFT, period, layoutmsg, swapcol r
bind = $mainMod SHIFT, comma, layoutmsg, swapcol l

# Scrolling layout control with mouse
bind = $mainMod SHIFT, mouse:276, layoutmsg, move +col
bind = $mainMod SHIFT, mouse:275, layoutmsg, move -col
bind = $mainMod SHIFT, mouse_down, layoutmsg, move +col
bind = $mainMod SHIFT, mouse_up, layoutmsg, move -col

# Plugin: hyprexpo
bind = $mainMod, A, hyprexpo:expo, toggle
# bind = $mainMod, A, overview:toggle, toggle

windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

########################################
#               plugins                #
########################################

plugin {

	hyprexpo {
	    columns = 3
	    gap_size = 0
	    skip_empty = 9
	    bg_col = rgb(000000)
	    workspace_method = center current # [center/first] [workspace] e.g. first 1 or center m+1
	}
	
	dynamic-cursors {
		
		    # enables the plugin
		    enabled = true
		    mode = rotate
		    threshold = 2
		
		    # for mode = rotate
		    rotate {
		        length = 24
		        offset = 32
		    }
		
		    # for mode = tilt
		    tilt {
		        limit = 2000
		        function = negative_quadratic
		        window = 300
		        full_tilt = 100
		    }
		
		    # for mode = stretch
		    stretch {
		        limit = 800
		        function = negative_quadratic
		        window = 200
		    }
		
		    shake {
		        enabled = true
		        nearest = true
		        threshold = 3.0
		        base = 1.0
		        speed = 1.0
		        influence = 0.0
		        limit = 4
		        timeout = 1000
		        effects = true
		        ipc = false
		    }
		
		    hyprcursor {
		        nearest = true
		        enabled = true
		        resolution = -1
		        fallback = clientside
		    }
	}
}
